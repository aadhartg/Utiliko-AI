version: "3.9"

services:

  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: utiliko-postgres
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis (Celery / AI Queue)
  redis:
    image: redis:7-alpine
    container_name: utiliko-redis
    restart: unless-stopped

  # Alembic Migrator
  migrator:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python migrations.py upgrade
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  # Backend (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: utiliko-backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    env_file:
      - ./backend/.env
    environment:
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend/data:/app/data
      - backend_static:/app/static
      - ml_models:/app/ml/models
    command: >
      sh -c "python migrations.py upgrade && python run.py server"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      migrator:
        condition: service_completed_successfully
    restart: unless-stopped

  # ML Trainer (Batch AI Job)
  ml_trainer:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python -m ml.train --data-dir /app/data --output-dir /app/ml/models
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/data:/app/data
      - ml_models:/app/ml/models
    depends_on:
      db:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    restart: "no"

  # Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
    restart: unless-stopped

  # LMS Frontend
  lms-frontend:
    build:
      context: ./lms-frontend
      dockerfile: Dockerfile
    ports:
      - "${LMS_PORT:-3001}:3000"
    env_file:
      - ./lms-frontend/.env
    depends_on:
      - backend
    restart: unless-stopped

  # Celery Worker
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: utiliko-worker
    command: python run.py celery
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend/data:/app/data
      - ml_models:/app/ml/models
    restart: unless-stopped

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: utiliko-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    restart: unless-stopped

# Volumes
volumes:
  pg_data:
  backend_static:
  ml_models: