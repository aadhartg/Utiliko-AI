global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "utiliko_backend"
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:8000"]
    scrape_interval: 30s

  - job_name: "postgres"
    static_configs:
      - targets: ["db:5432"]

  - job_name: "redis"
    static_configs:
      - targets: ["redis:6379"]
